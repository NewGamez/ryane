<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryané</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Ryané</header>

<section class="hero">
    <h1>Luxury Fragrance</h1>
    <p>Entdecke deinen Signature Duft</p>
</section>

<section class="products">
    <div class="product">
        <h2>Ryané Noir</h2>
        <p>€59</p>
        <button onclick="addToCart('Ryané Noir', 59)">Kaufen</button>
    </div>

    <div class="product">
        <h2>Ryané Rose</h2>
        <p>€49</p>
        <button onclick="addToCart('Ryané Rose', 49)">Kaufen</button>
    </div>

    <div class="product">
        <h2>Ryané Gold</h2>
        <p>€79</p>
        <button onclick="addToCart('Ryané Gold', 79)">Kaufen</button>
    </div>
</section>

<section class="cart">
    <h2>Warenkorb</h2>
    <ul id="cart-list"></ul>
    <p>Gesamt: €<span id="total">0</span></p>
    <button onclick="checkout()">Bestellen</button>
</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price) {
    cart.push({ name, price });
    saveCart();
    updateCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    saveCart();
    updateCart();
}

function updateCart() {
    let list = document.getElementById("cart-list");
    let total = 0;
    list.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price;

        let li = document.createElement("li");
        li.innerHTML = `
            ${item.name} - €${item.price}
            <button onclick="removeFromCart(${index})">✕</button>
        `;
        list.appendChild(li);
    });

    document.getElementById("total").textContent = total;
}

function checkout() {
    if(cart.length === 0){
        alert("Warenkorb ist leer");
        return;
    }

    alert("✨ Danke für deine Bestellung bei Ryané ✨");
    cart = [];
    saveCart();
    updateCart();
}

window.onload = updateCart;
</script>

</body>
</html>
